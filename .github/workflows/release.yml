name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'        # v1.2.3
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'  # v1.2.3-rc.1

permissions:
  contents: write
  packages: write
  id-token: write  # For OIDC-based AWS auth

jobs:
  # ─── Validate Tag ────────────────────────────────────────────────────────────
  validate:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      is_prerelease: ${{ steps.parse.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Parse version tag
        id: parse
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$TAG" == *"-rc."* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi
          echo "Releasing: $TAG (version: $VERSION)"

      - name: Check tag is on main branch
        if: steps.parse.outputs.is_prerelease == 'false'
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "ERROR: Production release tags must be on the main branch"
            exit 1
          fi

  # ─── Build & Test ────────────────────────────────────────────────────────────
  build:
    name: Build Release Artefacts
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and verify
        run: mvn -B verify -Pcoverage --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Build production JAR
        run: mvn -B package -DskipTests --no-transfer-progress -Drevision=${{ needs.validate.outputs.version }}

      - name: Upload JAR artefact
        uses: actions/upload-artifact@v4
        with:
          name: release-jar
          path: target/*.jar
          retention-days: 30

  # ─── Container Image ─────────────────────────────────────────────────────────
  container:
    name: Build and Push Container Image
    runs-on: ubuntu-latest
    needs: [validate, build]
    if: hashFiles('Dockerfile') != ''
    steps:
      - uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: release-jar
          path: target/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ github.event.repository.name }}:${{ needs.validate.outputs.version }}
            ${{ steps.ecr-login.outputs.registry }}/${{ github.event.repository.name }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.validate.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── GitHub Release ──────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, build]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog generation

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: release-jar
          path: release-artefacts/

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" "$PREVIOUS_TAG"..HEAD \
              | grep -v "^- Merge" | head -50)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" | head -20)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release v${{ needs.validate.outputs.version }}
          prerelease: ${{ needs.validate.outputs.is_prerelease }}
          generate_release_notes: true
          body: |
            ## Changes in v${{ needs.validate.outputs.version }}

            ${{ steps.changelog.outputs.changelog }}

            ---
            **Full diff:** [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commits/${{ github.sha }})
          files: |
            release-artefacts/*.jar
