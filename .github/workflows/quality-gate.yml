name: Quality Gate

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # ─── Java / Spring Boot ─────────────────────────────────────────────────────
  java-quality:
    name: Java — Build, Test & Coverage
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.modified, '.java') ||
      contains(github.event.head_commit.modified, 'pom.xml') ||
      github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test with coverage
        run: mvn -B verify --no-transfer-progress -Pcoverage
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Check coverage thresholds
        run: |
          mvn -B jacoco:check --no-transfer-progress \
            -Djacoco.minimum.line.coverage=0.80 \
            -Djacoco.minimum.branch.coverage=0.70
        if: always()

      - name: Publish JaCoCo report
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: '**/target/site/jacoco/jacoco.xml'
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          min-coverage-changed-files: 80
          title: 'Java Coverage Report'
        if: github.event_name == 'pull_request'

      - name: Upload Surefire reports on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/'
          retention-days: 7

  # ─── Angular ────────────────────────────────────────────────────────────────
  angular-quality:
    name: Angular — Lint, Test & Coverage
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.modified, '.ts') ||
      contains(github.event.head_commit.modified, 'package.json') ||
      github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm run test:ci -- --code-coverage --browsers=ChromeHeadless

      - name: Check coverage thresholds
        run: |
          npm run test:coverage-check
        # Expects package.json to have a coverage-check script that fails if below threshold

      - name: Upload coverage to PR
        uses: actions/upload-artifact@v4
        with:
          name: angular-coverage
          path: coverage/
          retention-days: 7

  # ─── Python ─────────────────────────────────────────────────────────────────
  python-quality:
    name: Python — Lint, Type-check & Test
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.modified, '.py') ||
      contains(github.event.head_commit.modified, 'pyproject.toml') ||
      github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Format check
        run: ruff format --check .

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy --strict src/

      - name: Test with coverage
        run: pytest --cov --cov-fail-under=80 --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: coverage.xml
          retention-days: 7
